name: Deploy Pipeline Job

on:
  push:
    branches:
      - main
    paths:
      - scripts/**
      - src/**
      - Dockerfile
      - requirements.txt
      - pyproject.toml
      - .dockerignore
      - .gcloudignore
      - .github/workflows/deploy-pipeline-job.yml
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: pipeline-job-deploy
  cancel-in-progress: true

env:
  PROJECT_ID: noble-kingdom-497421-f7
  REGION: us-central1
  JOB_NAME: wilco-owner-pipeline
  REPORT_SOURCE_GCS_PREFIX: gs://wilcoanalysis-artifacts-noble-kingdom-497421-f7/reports/latest
  OWNER_INPUT_GCS_URI: gs://wilcoanalysis-artifacts-noble-kingdom-497421-f7/raw/Owner_20260602.csv
  OWNER_SAMPLE_SEGMENTS: "50000"
  OWNER_EXCLUDE_ORGANIZATIONS_MULTI_PROPERTY: "true"
  DEPLOY_SERVICE_ACCOUNT: github-deployer@noble-kingdom-497421-f7.iam.gserviceaccount.com
  WORKLOAD_IDENTITY_PROVIDER: projects/921836521382/locations/global/workloadIdentityPools/github-pool/providers/github-wilcoanalysis

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.DEPLOY_SERVICE_ACCOUNT }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy pipeline job
        run: |
          gcloud run jobs deploy "${JOB_NAME}" \
            --source . \
            --region "${REGION}" \
            --project "${PROJECT_ID}" \
            --command python \
            --args scripts/run_owner_pipeline_gcs_job.py \
            --set-env-vars "OWNER_INPUT_GCS_URI=${OWNER_INPUT_GCS_URI},REPORT_OUTPUT_GCS_PREFIX=${REPORT_SOURCE_GCS_PREFIX},OWNER_SAMPLE_SEGMENTS=${OWNER_SAMPLE_SEGMENTS},OWNER_EXCLUDE_ORGANIZATIONS_MULTI_PROPERTY=${OWNER_EXCLUDE_ORGANIZATIONS_MULTI_PROPERTY}" \
            --memory 4Gi \
            --cpu 2 \
            --task-timeout 3600 \
            --quiet
